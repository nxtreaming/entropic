name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Linux (x86_64)
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest-m
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: dominant-strategies/openclaw
          token: ${{ secrets.NOVA_READ_PAT }}
          path: openclaw

      - name: Checkout Nova skills
        uses: actions/checkout@v4
        with:
          repository: dominant-strategies/nova-skills
          token: ${{ secrets.NOVA_READ_PAT }}
          path: nova-skills

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Free disk space (pre-build)
        run: |
          echo "=== Before cleanup ==="
          df -h /
          # Remove pre-installed bloat (frees ~12-15GB)
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af --volumes || true
          echo "=== After cleanup ==="
          df -h /

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install OpenClaw dependencies
        working-directory: openclaw
        run: pnpm install

      - name: Build OpenClaw
        working-directory: openclaw
        run: pnpm build

      - name: Build OpenClaw runtime image (linux/amd64)
        env:
          OPENCLAW_SOURCE: ${{ github.workspace }}/openclaw
          NOVA_SKILLS_SOURCE: ${{ github.workspace }}/nova-skills
        run: ./scripts/build-openclaw-runtime.sh

      - name: Bundle runtime image tar
        run: ./scripts/bundle-runtime-image.sh

      - name: Build skill scanner image (linux/amd64)
        run: ./scripts/build-skill-scanner.sh

      - name: Bundle skill scanner image tar
        run: IMAGE=nova-skill-scanner:latest OUTPUT=src-tauri/resources/nova-skill-scanner.tar.gz ./scripts/bundle-runtime-image.sh

      - name: Reclaim disk after runtime bundle
        run: |
          docker image rm openclaw-runtime:latest || true
          docker image rm nova-skill-scanner:latest || true
          docker builder prune -af || true
          docker system prune -af --volumes || true
          rm -rf openclaw/node_modules openclaw nova-skills || true
          pnpm store prune || true
          echo "Disk usage after runtime cleanup:"
          df -h

      - name: Bundle runtime (Linux)
        run: ./scripts/bundle-runtime.sh linux x86_64

      - name: Build Tauri app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AUTH_REDIRECT_URL: "nova://auth/callback"
          NOVA_GOOGLE_CLIENT_ID: ${{ secrets.NOVA_GOOGLE_CLIENT_ID }}
          NOVA_GOOGLE_CLIENT_SECRET: ${{ secrets.NOVA_GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles deb,appimage

      - name: Prepare artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          shopt -s nullglob

          DEB_NAME="Nova-${VERSION}-linux-x86_64.deb"
          DEB_FILES=("$BUNDLE_DIR/deb/"*.deb)
          if [ "${#DEB_FILES[@]}" -eq 0 ]; then
            echo "No .deb bundle found in $BUNDLE_DIR/deb"
            exit 1
          fi
          cp "${DEB_FILES[0]}" "$DEB_NAME"
          echo "deb_name=$DEB_NAME" >> "$GITHUB_OUTPUT"

          APPIMAGE_NAME="Nova-${VERSION}-linux-x86_64.AppImage"
          APPIMAGE_FILES=("$BUNDLE_DIR/appimage/"*.AppImage)
          if [ "${#APPIMAGE_FILES[@]}" -eq 0 ]; then
            echo "No .AppImage bundle found in $BUNDLE_DIR/appimage"
            exit 1
          fi
          cp "${APPIMAGE_FILES[0]}" "$APPIMAGE_NAME"
          chmod +x "$APPIMAGE_NAME"
          echo "appimage_name=$APPIMAGE_NAME" >> "$GITHUB_OUTPUT"

          APPIMAGE_SIG=""
          APPIMAGE_SIG_FILES=("$BUNDLE_DIR/appimage/"*.AppImage.sig)
          if [ "${#APPIMAGE_SIG_FILES[@]}" -gt 0 ]; then
            APPIMAGE_SIG="$(cat "${APPIMAGE_SIG_FILES[0]}")"
          fi
          echo "appimage_sig=$APPIMAGE_SIG" >> "$GITHUB_OUTPUT"

          TAR_NAME="Nova-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p "nova-${VERSION}"
          cp "src-tauri/target/release/nova" "nova-${VERSION}/"
          cp -r "src-tauri/resources" "nova-${VERSION}/" 2>/dev/null || true
          tar czf "$TAR_NAME" "nova-${VERSION}"
          echo "tar_name=$TAR_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-linux-x86_64
          path: |
            ${{ steps.artifacts.outputs.deb_name }}
            ${{ steps.artifacts.outputs.appimage_name }}
            ${{ steps.artifacts.outputs.tar_name }}

      - name: Save updater metadata
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          cat > updater-linux.json << METAEOF
          {
            "platform": "linux-x86_64",
            "url": "https://github.com/dominant-strategies/nova-releases/releases/download/${VERSION}/Nova-${VERSION}-linux-x86_64.AppImage",
            "signature": "${{ steps.artifacts.outputs.appimage_sig }}"
          }
          METAEOF

      - name: Upload updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-linux
          path: updater-linux.json

  # ──────────────────────────────────────────────
  # Publish Linux assets
  # ──────────────────────────────────────────────
  publish-linux:
    needs: [build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: nova-release-publish-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate merged latest.json (Linux)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          SEMVER="${VERSION#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO="dominant-strategies/nova-releases"
          REPO_URL="https://github.com/${REPO}/releases/download/${VERSION}"
          LATEST_PATH="artifacts/latest.json"

          LINUX_SIG=""
          if [ -f artifacts/updater-linux/updater-linux.json ]; then
            LINUX_SIG="$(python3 -c "import json; d=json.load(open('artifacts/updater-linux/updater-linux.json')); print(d.get('signature',''))")"
          fi

          if gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            TMP_DIR="$(mktemp -d)"
            if gh release download "$VERSION" --repo "$REPO" --pattern latest.json --dir "$TMP_DIR" &>/dev/null; then
              cp "$TMP_DIR/latest.json" "$LATEST_PATH"
            fi
            rm -rf "$TMP_DIR"
          fi

          VERSION="$VERSION" SEMVER="$SEMVER" PUB_DATE="$PUB_DATE" REPO_URL="$REPO_URL" LINUX_SIG="$LINUX_SIG" \
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          latest_path = Path("artifacts/latest.json")
          if latest_path.exists():
              data = json.loads(latest_path.read_text())
          else:
              data = {}

          data["version"] = os.environ["SEMVER"]
          data["notes"] = f"Nova {os.environ['VERSION']}"
          data["pub_date"] = os.environ["PUB_DATE"]
          platforms = data.get("platforms") or {}
          platforms["linux-x86_64"] = {
              "url": f"{os.environ['REPO_URL']}/Nova-{os.environ['VERSION']}-linux-x86_64.AppImage",
              "signature": os.environ.get("LINUX_SIG", "")
          }
          data["platforms"] = platforms
          latest_path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          cat "$LATEST_PATH"

      - name: Create or update public release (Linux assets)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          REPO="dominant-strategies/nova-releases"

          FILES=()
          for f in artifacts/nova-linux-x86_64/*; do
            [ -f "$f" ] && FILES+=("$f")
          done
          [ -f artifacts/updater-linux/updater-linux.json ] && FILES+=("artifacts/updater-linux/updater-linux.json")
          FILES+=("artifacts/latest.json")

          if gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            gh release upload "$VERSION" "${FILES[@]}" --repo "$REPO" --clobber
          else
            if ! gh release create "$VERSION" "${FILES[@]}" \
              --repo "$REPO" \
              --title "Nova $VERSION" \
              --notes "Linux assets uploaded by Release Linux workflow."; then
              gh release upload "$VERSION" "${FILES[@]}" --repo "$REPO" --clobber
            fi
          fi
