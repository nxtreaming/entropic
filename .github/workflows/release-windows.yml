name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            "tag=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=$($env:GITHUB_REF -replace '^refs/tags/', '')" >> $env:GITHUB_OUTPUT
          }

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        shell: pwsh
        run: npm install -g pnpm

      - name: Validate release version
        shell: pwsh
        run: node .\scripts\check-release-version.mjs "${{ steps.version.outputs.tag }}"

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Prepare Windows release resources
        shell: pwsh
        env:
          OPENCLAW_RUNTIME_RELEASE_REPO: dominant-strategies/entropic-releases
          OPENCLAW_RUNTIME_RELEASE_TAG: runtime-latest
        run: |
          & .\scripts\prepare-windows-release-resources.ps1 -DownloadFromRuntimeRelease

      - name: Build Tauri app
        shell: pwsh
        env:
          ENTROPIC_BUILD_PROFILE: managed
          VITE_ENTROPIC_BUILD_PROFILE: managed
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AUTH_REDIRECT_URL: "entropic://auth/callback"
          ENTROPIC_GOOGLE_CLIENT_ID: ${{ secrets.ENTROPIC_GOOGLE_CLIENT_ID }}
          ENTROPIC_GOOGLE_CLIENT_SECRET: ${{ secrets.ENTROPIC_GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm.cmd tauri build --bundles nsis

      - name: Prepare unsigned Windows installer artifact
        id: unsigned_artifacts
        shell: pwsh
        run: |
          $bundleDir = Join-Path $PWD 'src-tauri\target\release\bundle\nsis'
          if (-not (Test-Path $bundleDir)) {
            throw "NSIS bundle directory not found: $bundleDir"
          }

          $installer = Get-ChildItem -Path $bundleDir -Filter '*.exe' -File |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS installer found in $bundleDir"
          }

          $unsignedInstaller = 'Entropic-unsigned-windows-x86_64-setup.exe'
          Copy-Item -Path $installer.FullName -Destination $unsignedInstaller -Force
          "installer_name=$unsignedInstaller" >> $env:GITHUB_OUTPUT

      - name: Upload unsigned installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-installer
          path: ${{ steps.unsigned_artifacts.outputs.installer_name }}

  sign-windows:
    needs: [build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Validate SSL.com signing secrets
        env:
          SSLCOM_ESIGNER_USERNAME: ${{ secrets.SSLCOM_ESIGNER_USERNAME }}
          SSLCOM_ESIGNER_PASSWORD: ${{ secrets.SSLCOM_ESIGNER_PASSWORD }}
          SSLCOM_ESIGNER_CREDENTIAL_ID: ${{ secrets.SSLCOM_ESIGNER_CREDENTIAL_ID }}
          SSLCOM_ESIGNER_TOTP_SECRET: ${{ secrets.SSLCOM_ESIGNER_TOTP_SECRET }}
        run: |
          missing=()
          for name in \
            SSLCOM_ESIGNER_USERNAME \
            SSLCOM_ESIGNER_PASSWORD \
            SSLCOM_ESIGNER_CREDENTIAL_ID \
            SSLCOM_ESIGNER_TOTP_SECRET; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub Actions secrets for SSL.com eSigner signing: ${missing[*]}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download unsigned installer
        uses: actions/download-artifact@v4
        with:
          name: unsigned-windows-installer
          path: artifacts/unsigned-windows

      - name: List unsigned installer artifacts
        run: find artifacts/unsigned-windows -type f | sort

      - name: Sign Windows installer with SSL.com eSigner
        uses: SSLcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.SSLCOM_ESIGNER_USERNAME }}
          password: ${{ secrets.SSLCOM_ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.SSLCOM_ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSLCOM_ESIGNER_TOTP_SECRET }}
          file_path: artifacts/unsigned-windows/Entropic-unsigned-windows-x86_64-setup.exe
          output_path: artifacts/signed-windows
          clean_logs: true
          environment_name: PROD

      - name: Regenerate Tauri updater signature from signed installer
        id: artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "Signed artifact layout:"
          find artifacts/signed-windows -type f | sort

          INSTALLER_PATH="$(find artifacts/signed-windows -type f -name '*.exe' | sort | head -n 1)"
          if [ -z "$INSTALLER_PATH" ]; then
            echo "Signed installer not found in artifacts/signed-windows" >&2
            exit 1
          fi

          KEY_PATH="$RUNNER_TEMP/tauri.key"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          pnpm tauri signer sign -f "$KEY_PATH" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$INSTALLER_PATH"

          SIG_PATH="${INSTALLER_PATH}.sig"
          if [ ! -s "$SIG_PATH" ]; then
            echo "Missing or empty updater signature after signing: $SIG_PATH" >&2
            exit 1
          fi

          VERSION="${{ steps.version.outputs.tag }}"
          RELEASE_INSTALLER="Entropic-${VERSION}-windows-x86_64-setup.exe"
          RELEASE_SIGNATURE="${RELEASE_INSTALLER}.sig"
          cp "$INSTALLER_PATH" "$RELEASE_INSTALLER"
          cp "$SIG_PATH" "$RELEASE_SIGNATURE"

          SIGNATURE_VALUE="$(tr -d '\r\n' < "$RELEASE_SIGNATURE")"
          if [ -z "$SIGNATURE_VALUE" ]; then
            echo "Updater signature file is empty: $RELEASE_SIGNATURE" >&2
            exit 1
          fi

          {
            echo "installer_name=$RELEASE_INSTALLER"
            echo "installer_sig_name=$RELEASE_SIGNATURE"
            echo "installer_sig_value=$SIGNATURE_VALUE"
          } >> "$GITHUB_OUTPUT"

      - name: Upload signed Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: entropic-windows-x86_64
          path: |
            ${{ steps.artifacts.outputs.installer_name }}
            ${{ steps.artifacts.outputs.installer_sig_name }}

      - name: Save updater metadata
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          cat > updater-windows.json <<EOF
          {
            "platform": "windows-x86_64",
            "url": "https://github.com/dominant-strategies/entropic-releases/releases/download/${VERSION}/Entropic-${VERSION}-windows-x86_64-setup.exe",
            "signature": "${{ steps.artifacts.outputs.installer_sig_value }}"
          }
          EOF

      - name: Upload updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-windows
          path: updater-windows.json

  verify-windows-installer:
    needs: [sign-windows]
    runs-on: windows-2022
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Download signed Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: entropic-windows-x86_64
          path: artifacts\entropic-windows-x86_64

      - name: Verify Authenticode signature on signed installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path (Join-Path $PWD 'artifacts\entropic-windows-x86_64') -Filter '*.exe' -File |
            Select-Object -First 1
          if (-not $installer) {
            throw 'Signed installer artifact not found.'
          }

          $sig = Get-AuthenticodeSignature $installer.FullName
          Write-Host "$($installer.FullName) => $($sig.Status)"
          if ($sig.Status -ne 'Valid') {
            throw "Authenticode signature verification failed for $($installer.FullName): $($sig.StatusMessage)"
          }

  publish-windows:
    needs: [sign-windows, verify-windows-installer]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: entropic-release-publish-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate merged latest.json (Windows)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          SEMVER="${VERSION#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO="dominant-strategies/entropic-releases"
          REPO_URL="https://github.com/${REPO}/releases/download/${VERSION}"
          LATEST_PATH="artifacts/latest.json"
          NOTES_FILE="release-notes/${VERSION}.md"

          WINDOWS_SIG=""
          if [ -f artifacts/updater-windows/updater-windows.json ]; then
            WINDOWS_SIG="$(python3 -c "import json; d=json.load(open('artifacts/updater-windows/updater-windows.json')); print(d.get('signature',''))")"
          fi

          if gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            TMP_DIR="$(mktemp -d)"
            if gh release download "$VERSION" --repo "$REPO" --pattern latest.json --dir "$TMP_DIR" &>/dev/null; then
              cp "$TMP_DIR/latest.json" "$LATEST_PATH"
            fi
            rm -rf "$TMP_DIR"
          fi

          VERSION="$VERSION" SEMVER="$SEMVER" PUB_DATE="$PUB_DATE" REPO_URL="$REPO_URL" WINDOWS_SIG="$WINDOWS_SIG" NOTES_FILE="$NOTES_FILE" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          latest_path = Path("artifacts/latest.json")
          if latest_path.exists():
              data = json.loads(latest_path.read_text())
          else:
              data = {}

          notes_path = Path(os.environ["NOTES_FILE"])
          notes = notes_path.read_text().strip() if notes_path.exists() else f"Entropic {os.environ['VERSION']}"
          data["version"] = os.environ["SEMVER"]
          data["notes"] = notes
          data["pub_date"] = os.environ["PUB_DATE"]
          platforms = data.get("platforms") or {}
          platforms["windows-x86_64"] = {
              "url": f"{os.environ['REPO_URL']}/Entropic-{os.environ['VERSION']}-windows-x86_64-setup.exe",
              "signature": os.environ.get("WINDOWS_SIG", ""),
          }
          data["platforms"] = platforms
          latest_path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          cat "$LATEST_PATH"

      - name: Create or update public release (Windows assets)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          REPO="dominant-strategies/entropic-releases"
          NOTES_FILE="release-notes/${VERSION}.md"

          FILES=()
          for f in artifacts/entropic-windows-x86_64/*; do
            [ -f "$f" ] && FILES+=("$f")
          done
          [ -f artifacts/updater-windows/updater-windows.json ] && FILES+=("artifacts/updater-windows/updater-windows.json")
          FILES+=("artifacts/latest.json")

          if gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            gh release upload "$VERSION" "${FILES[@]}" --repo "$REPO" --clobber
            if [ -f "$NOTES_FILE" ]; then
              gh release edit "$VERSION" --repo "$REPO" --notes-file "$NOTES_FILE"
            fi
          else
            if [ -f "$NOTES_FILE" ]; then
              if ! gh release create "$VERSION" "${FILES[@]}" \
                --repo "$REPO" \
                --title "Entropic $VERSION" \
                --notes-file "$NOTES_FILE"; then
                gh release upload "$VERSION" "${FILES[@]}" --repo "$REPO" --clobber
                gh release edit "$VERSION" --repo "$REPO" --notes-file "$NOTES_FILE"
              fi
            else
              if ! gh release create "$VERSION" "${FILES[@]}" \
                --repo "$REPO" \
                --title "Entropic $VERSION" \
                --notes "Windows assets uploaded by Release Windows workflow."; then
                gh release upload "$VERSION" "${FILES[@]}" --repo "$REPO" --clobber
              fi
            fi
          fi

      - name: Validate live public release manifest (Windows)
        run: |
          for attempt in 1 2 3 4 5; do
            if node ./scripts/validate-public-release.mjs \
              "https://github.com/dominant-strategies/entropic-releases/releases/latest/download/latest.json" \
              "${{ steps.version.outputs.tag }}" \
              "windows-x86_64"; then
              exit 0
            fi
            echo "Manifest validation attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "Public release manifest validation failed after retries."
          exit 1
