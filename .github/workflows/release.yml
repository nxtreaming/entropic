name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Build OpenClaw runtime image for macOS (linux/arm64)
  # ──────────────────────────────────────────────
  build-runtime-arm64:
    runs-on: ubuntu-latest-m
    timeout-minutes: 60

    steps:
      - name: Checkout Nova
        uses: actions/checkout@v4
        with:
          path: nova

      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: dominant-strategies/openclaw
          token: ${{ secrets.NOVA_READ_PAT }}
          path: openclaw

      - name: Checkout Nova skills
        uses: actions/checkout@v4
        with:
          repository: dominant-strategies/nova-skills
          token: ${{ secrets.NOVA_READ_PAT }}
          path: nova-skills

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install -g pnpm

      - name: Install OpenClaw dependencies
        working-directory: openclaw
        run: pnpm install

      - name: Build OpenClaw
        working-directory: openclaw
        run: pnpm build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OpenClaw runtime image (linux/arm64)
        working-directory: nova
        env:
          OPENCLAW_SOURCE: ${{ github.workspace }}/openclaw
          NOVA_SKILLS_SOURCE: ${{ github.workspace }}/nova-skills
          DOCKER_DEFAULT_PLATFORM: linux/arm64
        run: ./scripts/build-openclaw-runtime.sh

      - name: Bundle runtime image tar
        working-directory: nova
        run: ./scripts/bundle-runtime-image.sh

      - name: Build skill scanner image (linux/arm64)
        working-directory: nova
        env:
          DOCKER_DEFAULT_PLATFORM: linux/arm64
        run: ./scripts/build-skill-scanner.sh

      - name: Bundle skill scanner image tar
        working-directory: nova
        run: IMAGE=nova-skill-scanner:latest OUTPUT=src-tauri/resources/nova-skill-scanner.tar.gz ./scripts/bundle-runtime-image.sh

      - name: Upload runtime image tar
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-runtime-arm64
          path: nova/src-tauri/resources/openclaw-runtime.tar.gz

      - name: Upload skill scanner image tar
        uses: actions/upload-artifact@v4
        with:
          name: skill-scanner-arm64
          path: nova/src-tauri/resources/nova-skill-scanner.tar.gz

  # ──────────────────────────────────────────────
  # macOS (Apple Silicon)
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest-xlarge
    timeout-minutes: 60
    needs: build-runtime-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download runtime image tar (linux/arm64)
        uses: actions/download-artifact@v4
        with:
          name: openclaw-runtime-arm64
          path: src-tauri/resources

      - name: Download skill scanner image tar (linux/arm64)
        uses: actions/download-artifact@v4
        with:
          name: skill-scanner-arm64
          path: src-tauri/resources

      - name: Bundle runtime (Colima + Lima + Docker CLI)
        run: ./scripts/bundle-runtime.sh

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          IDENTITIES_OUTPUT="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")"
          echo "$IDENTITIES_OUTPUT"

          IDENTITY_COUNT="$(printf '%s\n' "$IDENTITIES_OUTPUT" \
            | awk '/[0-9]+\) [0-9A-F]{40} / {count++} END {print count+0}')"

          if [ "$IDENTITY_COUNT" -eq 0 ]; then
            echo "No code signing identities were imported from APPLE_CERTIFICATE."
            exit 1
          elif [ "$IDENTITY_COUNT" -eq 1 ]; then
            SIGNING_SHA1="$(printf '%s\n' "$IDENTITIES_OUTPUT" \
              | awk '/[0-9]+\) [0-9A-F]{40} / {print $2; exit}')"
          else
            SIGNING_SHA1="$(printf '%s\n' "$IDENTITIES_OUTPUT" \
              | awk -v identity="$APPLE_SIGNING_IDENTITY" 'index($0, "\"" identity "\"") {print $2; exit}')"
            if [ -z "$SIGNING_SHA1" ]; then
              echo "Multiple identities found; APPLE_SIGNING_IDENTITY did not match any imported identity."
              echo "Set APPLE_SIGNING_IDENTITY to the exact certificate label shown above."
              exit 1
            fi
          fi

          echo "APPLE_SIGNING_IDENTITY_SHA1=$SIGNING_SHA1" >> "$GITHUB_ENV"
          rm certificate.p12

      - name: Build Tauri app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AUTH_REDIRECT_URL: "nova://auth/callback"
          NOVA_GOOGLE_CLIENT_ID: ${{ secrets.NOVA_GOOGLE_CLIENT_ID }}
          NOVA_GOOGLE_CLIENT_SECRET: ${{ secrets.NOVA_GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY_SHA1 }}
        run: pnpm tauri build

      - name: Sign bundled binaries
        env:
          CERT: ${{ env.APPLE_SIGNING_IDENTITY_SHA1 }}
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/Nova.app"
          ENTITLEMENTS="src-tauri/entitlements.plist"

          # docker only needs basic signature (no special entitlements)
          if [ -f "$APP_PATH/Contents/Resources/resources/bin/docker" ]; then
            codesign --force --options runtime --timestamp --sign "$CERT" \
              "$APP_PATH/Contents/Resources/resources/bin/docker"
          fi

          # limactl needs virtualization entitlement - it calls Virtualization.framework
          # colima also needs it as it invokes limactl which creates VZ VMs
          for bin in colima limactl; do
            if [ -f "$APP_PATH/Contents/Resources/resources/bin/$bin" ]; then
              codesign --force --options runtime --timestamp --sign "$CERT" \
                --entitlements "$ENTITLEMENTS" \
                "$APP_PATH/Contents/Resources/resources/bin/$bin"
            fi
          done

          codesign --force --options runtime --timestamp --sign "$CERT" \
            --entitlements "$ENTITLEMENTS" --deep "$APP_PATH"

      - name: Create and sign DMG
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/Nova.app"
          DMG_NAME="Nova-${{ steps.version.outputs.tag }}-mac-arm64.dmg"

          # Detach any mounted "Nova" volumes to avoid "Resource busy"
          for vol in /Volumes/Nova*; do
            [ -d "$vol" ] && hdiutil detach "$vol" -force 2>/dev/null || true
          done

          # Remove stale DMG from previous run
          rm -f "$DMG_NAME"

          hdiutil create -volname "Nova" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_NAME"
          codesign --force --timestamp --sign "${{ env.APPLE_SIGNING_IDENTITY_SHA1 }}" "$DMG_NAME"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "${{ env.dmg_name }}" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait
          xcrun stapler staple "${{ env.dmg_name }}"

      - name: Prepare updater artifacts
        id: updater
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          UPDATER_TAR="$BUNDLE_DIR/Nova.app.tar.gz"
          UPDATER_SIG="$BUNDLE_DIR/Nova.app.tar.gz.sig"

          if [ -f "$UPDATER_SIG" ]; then
            echo "sig=$(cat "$UPDATER_SIG")" >> "$GITHUB_OUTPUT"
            echo "has_updater=true" >> "$GITHUB_OUTPUT"
            cp "$UPDATER_TAR" "Nova-${{ steps.version.outputs.tag }}-mac-arm64-updater.tar.gz"
          else
            echo "has_updater=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: No updater signature found. Set TAURI_SIGNING_PRIVATE_KEY to enable auto-updates."
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-mac-arm64
          path: |
            ${{ env.dmg_name }}
            Nova-${{ steps.version.outputs.tag }}-mac-arm64-updater.tar.gz

      - name: Save updater metadata
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          cat > updater-mac.json << METAEOF
          {
            "platform": "darwin-aarch64",
            "url": "https://github.com/dominant-strategies/nova-releases/releases/download/${VERSION}/Nova-${VERSION}-mac-arm64-updater.tar.gz",
            "signature": "${{ steps.updater.outputs.sig }}",
            "has_updater": "${{ steps.updater.outputs.has_updater }}"
          }
          METAEOF

      - name: Upload updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-mac
          path: updater-mac.json

  # ──────────────────────────────────────────────
  # Publish macOS assets
  # ──────────────────────────────────────────────
  publish-macos:
    needs: [build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: nova-release-publish-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate merged latest.json (macOS)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          SEMVER="${VERSION#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO="dominant-strategies/nova-releases"
          REPO_URL="https://github.com/${REPO}/releases/download/${VERSION}"
          LATEST_PATH="artifacts/latest.json"

          MAC_SIG=""
          if [ -f artifacts/updater-mac/updater-mac.json ]; then
            MAC_SIG="$(python3 -c "import json; d=json.load(open('artifacts/updater-mac/updater-mac.json')); print(d.get('signature',''))")"
          fi

          if gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            TMP_DIR="$(mktemp -d)"
            if gh release download "$VERSION" --repo "$REPO" --pattern latest.json --dir "$TMP_DIR" &>/dev/null; then
              cp "$TMP_DIR/latest.json" "$LATEST_PATH"
            fi
            rm -rf "$TMP_DIR"
          fi

          VERSION="$VERSION" SEMVER="$SEMVER" PUB_DATE="$PUB_DATE" REPO_URL="$REPO_URL" MAC_SIG="$MAC_SIG" \
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          latest_path = Path("artifacts/latest.json")
          if latest_path.exists():
              data = json.loads(latest_path.read_text())
          else:
              data = {}

          data["version"] = os.environ["SEMVER"]
          data["notes"] = f"Nova {os.environ['VERSION']}"
          data["pub_date"] = os.environ["PUB_DATE"]
          platforms = data.get("platforms") or {}
          platforms["darwin-aarch64"] = {
              "url": f"{os.environ['REPO_URL']}/Nova-{os.environ['VERSION']}-mac-arm64-updater.tar.gz",
              "signature": os.environ.get("MAC_SIG", "")
          }
          data["platforms"] = platforms
          latest_path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          cat "$LATEST_PATH"

      - name: Create or update public release (macOS assets)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          REPO="dominant-strategies/nova-releases"

          FILES=()
          for f in artifacts/nova-mac-arm64/*; do
            [ -f "$f" ] && FILES+=("$f")
          done
          [ -f artifacts/updater-mac/updater-mac.json ] && FILES+=("artifacts/updater-mac/updater-mac.json")
          FILES+=("artifacts/latest.json")

          if gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            gh release upload "$VERSION" "${FILES[@]}" --repo "$REPO" --clobber
          else
            if ! gh release create "$VERSION" "${FILES[@]}" \
              --repo "$REPO" \
              --title "Nova $VERSION" \
              --notes "macOS assets uploaded by Release macOS workflow."; then
              gh release upload "$VERSION" "${FILES[@]}" --repo "$REPO" --clobber
            fi
          fi
